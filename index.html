<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatiFin - Solusi Keuangan Cerdas</title>
    
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --primary: #4e73df; --bg-light: #f8f9fc; --sidebar-bg: #2e59d9; }
        
        /* DARK MODE */
        body.dark-mode { --bg-light: #121212; background: var(--bg-light); color: #ffffff; }
        body.dark-mode .sidebar { background: #000000; }
        body.dark-mode .card, body.dark-mode .modal-content { background: #1e1e1e; color: #ffffff; border: 1px solid #333333; }
        body.dark-mode .form-control, body.dark-mode .form-select { background: #2d2d2d; border-color: #444444; color: #ffffff !important; }

        /* MOBILE OPTIMIZATION */
        body { background: var(--bg-light); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        
        /* Sidebar Responsive Fix */
        .sidebar { 
            min-height: 100vh; 
            background: var(--sidebar-bg); 
            color: white; 
            z-index: 1000; 
            transition: all 0.3s;
        }

        @media (max-width: 767.98px) {
            .sidebar {
                position: fixed;
                left: -100%; /* Sembunyi di kiri pada HP */
                width: 250px;
            }
            .sidebar.active {
                left: 0; /* Muncul saat tombol menu diklik */
            }
            main { margin-left: 0 !important; width: 100% !important; }
        }

        @media (min-width: 768px) {
            main { margin-left: 16.666667%; } /* Beri ruang untuk sidebar di desktop */
            .mobile-nav-toggle { display: none; }
        }

        .nav-link { color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 10px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link.active { background: rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .menu-section { display: none; padding-top: 20px; }
        .menu-section.active { display: block; }
        .app-logo { width: 100px; }
        .sidebar-profile { width: 60px; height: 60px; object-fit: cover; border: 2px solid #fff; }

        /* Snapshot Design */
        #capture-area { padding: 40px 20px; text-align: center; color: white; border-radius: 20px; }
        .bg-snapshot-dark { background: #1e293b; }
    </style>
</head>
<body>

<!-- TOMBOL MENU MOBILE (Hanya muncul di HP) -->
<button class="btn btn-primary mobile-nav-toggle position-fixed top-0 start-0 m-3 z-3" onclick="toggleSidebar()" style="z-index: 1100;">
    <i class="bi bi-list"></i>
</button>

<!-- AUTH SCREEN -->
<div id="auth-screen">
    <div class="card p-4 shadow-lg animate__animated animate__zoomIn" style="width: 90%; max-width: 350px;">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">GatiFin</h4>
        </div>
        <form id="loginForm">
            <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Masuk</button>
        </form>
    </div>
</div>

<div class="container-fluid" id="main-app" style="display: none;">
    <div class="row">
        <!-- Sidebar -->
        <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block sidebar py-4 position-fixed">
            <div class="text-center mb-4">
                <img src="https://via.placeholder.com/150" id="sidebar-img-display" class="sidebar-profile rounded-circle mb-2">
                <div class="fw-bold text-white small" id="sidebar-username-display">@user</div>
            </div>
            <ul class="nav flex-column px-2">
                <li class="nav-item"><a class="nav-link active" onclick="showMenu('beranda', this)"><i class="bi bi-house-door me-2"></i> Beranda</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('tambah', this)"><i class="bi bi-plus-square me-2"></i> Catatan</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('riwayat', this)"><i class="bi bi-clock-history me-2"></i> Riwayat</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('settings', this)"><i class="bi bi-gear me-2"></i> Pengaturan</a></li>
                <li class="nav-item mt-4"><a class="nav-link text-danger" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Keluar</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <section id="beranda" class="menu-section active">
                <h3 class="fw-bold mb-4">Dashboard</h3>
                <div class="row g-3 mb-4">
                    <div class="col-12 col-md-4"><div class="card bg-primary text-white p-3">Saldo<h4 id="disp-saldo">0</h4></div></div>
                    <div class="col-6 col-md-4"><div class="card bg-success text-white p-3">Masuk<h4 id="disp-masuk">0</h4></div></div>
                    <div class="col-6 col-md-4"><div class="card bg-danger text-white p-3">Keluar<h4 id="disp-keluar">0</h4></div></div>
                </div>
            </section>

            <section id="tambah" class="menu-section">
                <h3 class="fw-bold mb-4">Tambah Data</h3>
                <div class="card p-3">
                    <form id="financeForm">
                        <select class="form-select mb-3" id="type"><option value="masuk">Masuk</option><option value="keluar">Keluar</option></select>
                        <input type="number" id="amount" class="form-control mb-3" placeholder="Nominal" required>
                        <input type="text" id="note" class="form-control mb-3" placeholder="Keterangan" required>
                        <input type="date" id="date" class="form-control mb-3" required>
                        <button type="submit" class="btn btn-primary w-100">Simpan</button>
                    </form>
                </div>
            </section>

            <section id="riwayat" class="menu-section">
                <h3 class="fw-bold mb-4">Riwayat</h3>
                <div class="table-responsive">
                    <table class="table card">
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="settings" class="menu-section">
                <h3 class="fw-bold mb-4">Pengaturan</h3>
                <button class="btn btn-outline-dark" onclick="setTheme('dark')">Dark Mode</button>
                <button class="btn btn-outline-primary" onclick="setTheme('light')">Light Mode</button>
            </section>
        </main>
    </div>
</div>

<script>
    let currentUser = "";
    let transactions = [];

    // FIX: Toggle Sidebar Mobile
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // Login Logic
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        currentUser = document.getElementById('username').value;
        sessionStorage.setItem('fintrack_user', currentUser);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        loadData();
    });

    function loadData() {
        transactions = JSON.parse(localStorage.getItem(`db_${currentUser}`)) || [];
        document.getElementById('sidebar-username-display').innerText = "@" + currentUser;
        updateUI();
    }

    function updateUI() {
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = ''; 
        let inSum = 0, outSum = 0;
        transactions.forEach(t => {
            if(t.type === 'masuk') inSum += t.amount; else outSum += t.amount;
            tbody.innerHTML += `<tr><td>${t.date}</td><td>${t.note}</td><td class="fw-bold">Rp ${t.amount.toLocaleString()}</td></tr>`;
        });
        document.getElementById('disp-masuk').innerText = `Rp ${inSum.toLocaleString()}`;
        document.getElementById('disp-keluar').innerText = `Rp ${outSum.toLocaleString()}`;
        document.getElementById('disp-saldo').innerText = `Rp ${(inSum - outSum).toLocaleString()}`;
    }

    function showMenu(id, el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (window.innerWidth < 768) toggleSidebar(); // Tutup sidebar otomatis di HP setelah pilih menu
    }

    document.getElementById('financeForm').onsubmit = function(e) {
        e.preventDefault();
        transactions.unshift({
            type: document.getElementById('type').value,
            amount: parseInt(document.getElementById('amount').value),
            note: document.getElementById('note').value,
            date: document.getElementById('date').value
        });
        localStorage.setItem(`db_${currentUser}`, JSON.stringify(transactions));
        updateUI();
        this.reset();
    };

    function setTheme(t) { document.body.className = (t === 'dark' ? 'dark-mode' : ''); }
    function logout() { location.reload(); }
</script>
</body>
</html>
