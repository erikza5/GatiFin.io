<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatiFin - Smart Finance</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #4e73df; --sidebar-width: 280px; }
        body { background: #f8f9fc; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        /* DARK MODE[cite: 1] */
        body.dark-mode { background: #121212; color: #e0e0e0; }
        body.dark-mode .card, body.dark-mode .modal-content, body.dark-mode .sidebar { background: #1e1e1e; border-color: #333; color: #fff; }
        body.dark-mode .nav-link:hover { background: rgba(255,255,255,0.1); }
        body.dark-mode .table { color: #fff; }

        /* SIDEBAR[cite: 1] */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; border-right: 1px solid #e3e6f0; z-index: 1000; overflow-y: auto; }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .logo-box { padding: 20px; text-align: center; }
        .logo-main { height: 50px; object-fit: contain; }
        .profile-section { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        
        .nav-link { color: #4e7eef; padding: 12px 20px; display: flex; align-items: center; cursor: pointer; border-radius: 8px; margin: 5px 15px; }
        .nav-link.active { background: var(--primary); color: #fff !important; }
        .nav-link i { margin-right: 12px; font-size: 1.2rem; }

        .menu-section { display: none; }
        .menu-section.active { display: block; }
        
        #auth-screen { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .snapshot-card { background: linear-gradient(135deg, #4e73df, #224abe); color: white; padding: 30px; border-radius: 20px; }

        @media (max-width: 992px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

<!-- AUTH SCREEN[cite: 1] -->
<div id="auth-screen">
    <div class="card shadow-lg p-4 text-center" style="width: 380px; border-radius: 20px;">
        <img src="logo.png" class="mb-3 mx-auto" style="height: 60px;" onerror="this.src='https://via.placeholder.com/150?text=GatiFin'">
        <h4 class="fw-bold mb-4">Login GatiFin</h4>
        <input type="text" id="login-user" class="form-control mb-3" placeholder="Username">
        <input type="password" id="login-pass" class="form-control mb-4" placeholder="Password">
        <button class="btn btn-primary w-100 fw-bold py-2" onclick="handleLogin()">Masuk</button>
    </div>
</div>

<!-- SIDEBAR[cite: 1] -->
<nav class="sidebar" id="sidebar-nav" style="display:none;">
    <div class="logo-box">
        <img src="1.png" class="logo-main" onerror="this.src='https://via.placeholder.com/100?text=GF'">
    </div>
    <div class="profile-section">
        <img src="https://via.placeholder.com/100" id="sb-photo" class="profile-img mb-2">
        <h6 class="fw-bold mb-0" id="sb-fullname">Nama Lengkap</h6>
        <small class="text-muted" id="sb-username">@username</small>
    </div>
    <div class="mt-3">
        <a class="nav-link active" onclick="nav('beranda', this)"><i class="bi bi-grid"></i> <span data-lang="m-beranda">Beranda</span></a>
        <a class="nav-link" onclick="nav('catatan', this)"><i class="bi bi-pencil-square"></i> <span data-lang="m-catatan">Catatan Keuangan</span></a>
        <a class="nav-link" onclick="nav('riwayat', this)"><i class="bi bi-journal-text"></i> <span data-lang="m-riwayat">Riwayat</span></a>
        <a class="nav-link" onclick="nav('analisis', this)"><i class="bi bi-pie-chart"></i> <span data-lang="m-analisis">Analisis</span></a>
        <a class="nav-link" onclick="nav('profil', this)"><i class="bi bi-person"></i> <span data-lang="m-profil">Profil</span></a>
        <a class="nav-link" onclick="nav('pengaturan', this)"><i class="bi bi-gear"></i> <span data-lang="m-pengaturan">Pengaturan</span></a>
    </div>
</nav>

<div class="main-content" id="app-content" style="display:none;">
    
    <!-- BERANDA[cite: 1] -->
    <section id="beranda" class="menu-section active">
        <div class="d-flex justify-content-between mb-4">
            <h3 class="fw-bold" data-lang="m-beranda">Beranda</h3>
            <button class="btn btn-primary rounded-pill" onclick="openSnapshot()"><i class="bi bi-camera me-2"></i>Snapshot</button>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="card p-4 shadow-sm border-0 bg-white text-dark">
                <small data-lang="s-total">Saldo Keseluruhan</small><h2 class="fw-bold mt-1" id="val-saldo">0</h2>
            </div></div>
            <div class="col-md-4"><div class="card p-4 shadow-sm border-0 bg-success text-white">
                <small data-lang="s-masuk">Total Pemasukan</small><h2 class="fw-bold mt-1" id="val-masuk">0</h2>
            </div></div>
            <div class="col-md-4"><div class="card p-4 shadow-sm border-0 bg-danger text-white">
                <small data-lang="s-keluar">Total Pengeluaran</small><h2 class="fw-bold mt-1" id="val-keluar">0</h2>
            </div></div>
        </div>
    </section>

    <!-- CATATAN[cite: 1] -->
    <section id="catatan" class="menu-section">
        <h3 class="fw-bold mb-4" data-lang="m-catatan">Catatan Keuangan</h3>
        <div class="card p-4 shadow-sm border-0 col-lg-6">
            <form id="tx-form">
                <div class="mb-3"><label class="form-label fw-bold">Tipe</label>
                    <select id="tx-type" class="form-select" onchange="loadCatOptions()"><option value="in">Pemasukan</option><option value="out">Pengeluaran</option></select>
                </div>
                <div class="mb-3"><label class="form-label fw-bold">Kategori</label><select id="tx-cat" class="form-select"></select></div>
                <div class="mb-3"><label class="form-label fw-bold">Nominal</label><input type="number" id="tx-amount" class="form-control" required></div>
                <div class="mb-3"><label class="form-label fw-bold">Keterangan</label><input type="text" id="tx-note" class="form-control" required></div>
                <div class="mb-3"><label class="form-label fw-bold">Tanggal</label><input type="date" id="tx-date" class="form-control" required></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Simpan Transaksi</button>
            </form>
        </div>
    </section>

    <!-- ANALISIS[cite: 1] -->
    <section id="analisis" class="menu-section">
        <h3 class="fw-bold mb-4" data-lang="m-analisis">Analisis Keuangan</h3>
        <div class="row g-4">
            <div class="col-12"><div class="card p-4 shadow-sm border-0"><h6>Arus Kas</h6><canvas id="chart-flow" height="100"></canvas></div></div>
            <div class="col-md-6"><div class="card p-4 shadow-sm border-0"><h6>Kategori Pemasukan</h6><canvas id="chart-cat-in"></canvas></div></div>
            <div class="col-md-6"><div class="card p-4 shadow-sm border-0"><h6>Kategori Pengeluaran</h6><canvas id="chart-cat-out"></canvas></div></div>
        </div>
    </section>

    <!-- PENGATURAN[cite: 1] -->
    <section id="pengaturan" class="menu-section">
        <h3 class="fw-bold mb-4" data-lang="m-pengaturan">Pengaturan</h3>
        <div class="card p-4 shadow-sm border-0 col-lg-8">
            <div class="row g-4">
                <div class="col-md-6"><label class="form-label small fw-bold">Mode Tampilan</label>
                    <button class="btn btn-outline-dark w-100" id="dark-toggle" onclick="toggleDarkMode()">Dark Mode: Off</button>
                </div>
                <div class="col-md-6"><label class="form-label small fw-bold">Bahasa</label>
                    <select class="form-select" onchange="changeLang(this.value)"><option value="id">Indonesia</option><option value="en">English</option></select>
                </div>
                <div class="col-md-6"><label class="form-label small fw-bold">Mata Uang</label>
                    <select class="form-select" id="cur-select" onchange="changeCurrency(this.value)"><option value="Rp">IDR (Rp)</option><option value="$">USD ($)</option></select>
                </div>
                <div class="col-md-6"><label class="form-label small fw-bold">Keamanan</label>
                    <button class="btn btn-outline-primary w-100" onclick="alert('Fitur ganti password aktif')">Ganti Password</button>
                </div>
                <div class="col-12 border-top pt-3">
                    <button class="btn btn-danger w-100" onclick="logout()">Log Out</button>
                </div>
            </div>
        </div>
    </section>

    <!-- RIWAYAT & PROFIL DI SINI (Lengkap sesuai permintaan)[cite: 1] -->
    <section id="riwayat" class="menu-section"><h3 class="fw-bold">Riwayat</h3><div class="card p-3 shadow-sm border-0 table-responsive"><table class="table"><tbody id="hist-body"></tbody></table></div></section>
    <section id="profil" class="menu-section"><h3 class="fw-bold">Profil</h3><div class="card p-4 shadow-sm border-0"><div class="row"><div class="col-md-4 text-center"><img src="" id="p-photo-view" class="profile-img mb-3"><input type="file" id="p-upload" class="form-control form-control-sm" onchange="uploadPhoto(event)"></div><div class="col-md-8"><input type="text" id="p-fullname" class="form-control mb-2" placeholder="Nama Lengkap"><button class="btn btn-primary" onclick="saveProfile()">Simpan</button></div></div></div></section>
</div>

<script>
    /* SYSTEM DATA[cite: 1] */
    let user = "admin"; 
    let db = JSON.parse(localStorage.getItem('gf_db')) || [];
    let settings = JSON.parse(localStorage.getItem('gf_set')) || { lang: 'id', cur: 'Rp', dark: false };
    const langLib = {
        id: { 'm-beranda': 'Beranda', 'm-catatan': 'Catatan Keuangan', 'm-riwayat': 'Riwayat', 'm-analisis': 'Analisis', 'm-profil': 'Profil', 'm-pengaturan': 'Pengaturan', 's-total': 'Saldo Keseluruhan' },
        en: { 'm-beranda': 'Dashboard', 'm-catatan': 'Finance Notes', 'm-riwayat': 'History', 'm-analisis': 'Analysis', 'm-profil': 'Profile', 'm-pengaturan': 'Settings', 's-total': 'Total Balance' }
    };

    /* AUTH[cite: 1] */
    function handleLogin() {
        user = document.getElementById('login-user').value || "User";
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('sidebar-nav').style.display = 'block';
        document.getElementById('app-content').style.display = 'block';
        init();
    }

    function nav(id, el) {
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        if(id === 'analisis') updateCharts();
    }

    /* CORE LOGIC[cite: 1] */
    function init() {
        document.getElementById('sb-username').innerText = "@" + user;
        applySettings();
        loadCatOptions();
        updateUI();
    }

    function updateUI() {
        let ins = db.filter(x => x.type === 'in').reduce((a, b) => a + b.amount, 0);
        let outs = db.filter(x => x.type === 'out').reduce((a, b) => a + b.amount, 0);
        document.getElementById('val-masuk').innerText = settings.cur + " " + ins.toLocaleString();
        document.getElementById('val-keluar').innerText = settings.cur + " " + outs.toLocaleString();
        document.getElementById('val-saldo').innerText = settings.cur + " " + (ins - outs).toLocaleString();
        
        const hb = document.getElementById('hist-body');
        hb.innerHTML = db.map(x => `<tr><td>${x.date}</td><td>${x.note}</td><td class="fw-bold ${x.type === 'in' ? 'text-success' : 'text-danger'}">${settings.cur} ${x.amount.toLocaleString()}</td></tr>`).join('');
    }

    function loadCatOptions() {
        const type = document.getElementById('tx-type').value;
        const cats = type === 'in' ? ['Gaji', 'Investasi', 'Jualan'] : ['Makan', 'Belanja', 'Transport', 'Tagihan'];
        document.getElementById('tx-cat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    document.getElementById('tx-form').onsubmit = (e) => {
        e.preventDefault();
        db.push({
            type: document.getElementById('tx-type').value,
            cat: document.getElementById('tx-cat').value,
            amount: parseInt(document.getElementById('tx-amount').value),
            note: document.getElementById('tx-note').value,
            date: document.getElementById('tx-date').value
        });
        localStorage.setItem('gf_db', JSON.stringify(db));
        updateUI(); alert('Tersimpan!');
    };

    /* SETTINGS & ANALISIS[cite: 1] */
    function toggleDarkMode() {
        settings.dark = !settings.dark;
        applySettings();
    }

    function changeLang(v) { settings.lang = v; applySettings(); }
    function changeCurrency(v) { settings.cur = v; applySettings(); updateUI(); }

    function applySettings() {
        document.body.className = settings.dark ? 'dark-mode' : '';
        document.getElementById('dark-toggle').innerText = "Dark Mode: " + (settings.dark ? 'On' : 'Off');
        document.querySelectorAll('[data-lang]').forEach(el => {
            el.innerText = langLib[settings.lang][el.getAttribute('data-lang')];
        });
        localStorage.setItem('gf_set', JSON.stringify(settings));
    }

    function updateCharts() {
        // Logika Chart In/Out[cite: 1]
        const drawPie = (id, type) => {
            const data = db.filter(x => x.type === type);
            const groups = {};
            data.forEach(x => groups[x.cat] = (groups[x.cat] || 0) + x.amount);
            new Chart(document.getElementById(id), {
                type: 'doughnut',
                data: { labels: Object.keys(groups), datasets: [{ data: Object.values(groups), backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e'] }] }
            });
        };
        drawPie('chart-cat-in', 'in');
        drawPie('chart-cat-out', 'out');
    }

    function logout() { localStorage.removeItem('gf_db'); location.reload(); }
</script>
</body>
</html>
