<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatiFin - Smart Financial Solution</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary: #4e73df; --bg-light: #f8f9fc; --sidebar-bg: #2e59d9; }
        body.dark-mode { --bg-light: #121212; background: var(--bg-light); color: #ffffff; }
        body { background: var(--bg-light); font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--sidebar-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .sidebar { min-height: 100vh; background: var(--sidebar-bg); color: white; position: fixed; width: inherit; transition: 0.3s; }
        .nav-link { color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 10px; margin: 5px 10px; }
        .nav-link.active { background: rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .menu-section { display: none; }
        .menu-section.active { display: block; }
        
        .logo-login { width: 120px; margin-bottom: 20px; }
        .logo-sidebar { width: 40px; margin-right: 10px; }
        
        @media (max-width: 768px) {
            .sidebar { position: relative; min-height: auto; width: 100%; }
            main { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

<!-- SECTION: AUTH[cite: 1] -->
<div id="auth-screen">
    <div class="card p-4 shadow-lg text-center" style="width: 350px;">
        <img src="logo.png" alt="GatiFin Logo" class="logo-login mx-auto">
        <h5 class="fw-bold text-primary mb-4">GatiFin Login</h5>
        <form id="loginForm">
            <input type="text" id="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
        </form>
    </div>
</div>

<div class="container-fluid" id="main-app" style="display: none;">
    <div class="row">
        <!-- SIDEBAR[cite: 1] -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar py-4">
            <div class="px-3 mb-4 d-flex align-items-center">
                <img src="1.png" alt="Icon" class="logo-sidebar">
                <span class="fs-4 fw-bold">GatiFin</span>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" onclick="showMenu('beranda', this)" id="nav-home"><i class="bi bi-house me-2"></i> Beranda</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('tambah', this)" id="nav-add"><i class="bi bi-plus-circle me-2"></i> Tambah</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('analisis', this)" id="nav-analysis"><i class="bi bi-graph-up me-2"></i> Analisis</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('settings', this)" id="nav-settings"><i class="bi bi-gear me-2"></i> Pengaturan</a></li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <!-- BERANDA[cite: 1] -->
            <section id="beranda" class="menu-section active">
                <h2 id="txt-welcome" class="fw-bold mb-4">Selamat Datang</h2>
                <div class="row g-3">
                    <div class="col-md-6"><div class="card p-4 bg-primary text-white"><h6>Total Saldo</h6><h3 id="disp-saldo">Rp 0</h3></div></div>
                </div>
            </section>

            <!-- ANALISIS KATEGORI[cite: 1] -->
            <section id="analisis" class="menu-section">
                <h2 class="fw-bold mb-4">Analisis Kategori</h2>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card p-3 shadow-sm mb-4">
                            <h6 class="text-center">Pengeluaran per Kategori</h6>
                            <canvas id="categoryChartOut"></canvas>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-3 shadow-sm mb-4">
                            <h6 class="text-center">Pemasukan per Kategori</h6>
                            <canvas id="categoryChartIn"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <!-- PENGATURAN[cite: 1] -->
            <section id="settings" class="menu-section">
                <h2 class="fw-bold mb-4">Pengaturan</h2>
                <div class="card p-4 col-lg-6">
                    <label class="form-label fw-bold">Pilih Bahasa / Language</label>
                    <select class="form-select mb-4" onchange="changeLanguage(this.value)">
                        <option value="id">Bahasa Indonesia</option>
                        <option value="en">English</option>
                    </select>
                    <button class="btn btn-danger" onclick="logout()">Logout</button>
                </div>
            </section>
        </main>
    </div>
</div>

<script>
    /* --- DATA & MULTILANGUAGE[cite: 1] --- */
    let transactions = [];
    const langData = {
        id: { home: "Beranda", add: "Tambah", analysis: "Analisis", settings: "Pengaturan", welcome: "Selamat Datang" },
        en: { home: "Dashboard", add: "Add Note", analysis: "Analysis", settings: "Settings", welcome: "Welcome Back" }
    };

    function changeLanguage(lang) {
        document.getElementById('nav-home').innerHTML = `<i class="bi bi-house me-2"></i> ${langData[lang].home}`;
        document.getElementById('nav-add').innerHTML = `<i class="bi bi-plus-circle me-2"></i> ${langData[lang].add}`;
        document.getElementById('nav-analysis').innerHTML = `<i class="bi bi-graph-up me-2"></i> ${langData[lang].analysis}`;
        document.getElementById('nav-settings').innerHTML = `<i class="bi bi-gear me-2"></i> ${langData[lang].settings}`;
        document.getElementById('txt-welcome').innerText = langData[lang].welcome;
        localStorage.setItem('gatifin_lang', lang);
    }

    /* --- CHART SYSTEM[cite: 1] --- */
    let chartIn, chartOut;
    function updateCharts() {
        const categories = {
            masuk: {}, keluar: {}
        };
        
        transactions.forEach(t => {
            categories[t.type][t.category] = (categories[t.type][t.category] || 0) + t.amount;
        });

        if(chartIn) chartIn.destroy();
        chartIn = new Chart(document.getElementById('categoryChartIn'), {
            type: 'pie',
            data: {
                labels: Object.keys(categories.masuk),
                datasets: [{ data: Object.values(categories.masuk), backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e'] }]
            }
        });

        if(chartOut) chartOut.destroy();
        chartOut = new Chart(document.getElementById('categoryChartOut'), {
            type: 'pie',
            data: {
                labels: Object.keys(categories.keluar),
                datasets: [{ data: Object.values(categories.keluar), backgroundColor: ['#e74c3c', '#f39c12', '#9b59b6', '#34495e'] }]
            }
        });
    }

    /* --- APP FLOW[cite: 1] --- */
    function showMenu(m, el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(m).classList.add('active');
        if(m === 'analisis') updateCharts();
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        // Inisialisasi bahasa dari storage
        const savedLang = localStorage.getItem('gatifin_lang') || 'id';
        changeLanguage(savedLang);
    });

    function logout() { location.reload(); }
</script>
</body>
</html>
