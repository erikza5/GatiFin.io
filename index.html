<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GatiFin - Solusi Keuangan Cerdas</title>
    
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- JS Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary: #4e73df; --bg-light: #f8f9fc; --sidebar-bg: #2e59d9; }
        
        /* Dark Mode Styles */
        body.dark-mode { --bg-light: #121212; background: var(--bg-light); color: #ffffff; }
        body.dark-mode .sidebar { background: #000000; }
        body.dark-mode .card, body.dark-mode .modal-content { background: #1e1e1e; color: #ffffff; border: 1px solid #333333; }
        body.dark-mode .form-control, body.dark-mode .form-select { background: #2d2d2d; border-color: #444444; color: #ffffff !important; }
        body.dark-mode .form-label { color: #ffffff; }
        body.dark-mode .table { color: #ffffff; border-color: #333333; }

        body { background: var(--bg-light); font-family: 'Segoe UI', sans-serif; transition: background 0.3s; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sidebar-bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .app-logo { width: 120px; height: auto; }
        .menu-section { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s ease; }
        .menu-section.active { display: block; opacity: 1; transform: translateY(0); }
        .sidebar { min-height: 100vh; background: var(--sidebar-bg); color: white; z-index: 1000; }
        .nav-link { color: rgba(255,255,255,0.7); cursor: pointer; border-radius: 10px; margin-bottom: 5px; }
        .nav-link.active { background: rgba(255,255,255,0.2); color: white; font-weight: bold; }
        .card { border: none; border-radius: 15px; box-shadow: 0 0.15rem 1.75rem 0 rgba(0,0,0,0.05); }
        .sidebar-profile { width: 80px; height: 80px; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); }

        /* Snapshot Styles */
        #capture-area { position: relative; padding: 50px 35px; color: #fff; text-align: center; min-height: 400px; }
        .bg-snapshot-dark { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .bg-snapshot-blue { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .glass-card-snapshot { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px); border-radius: 15px; padding: 15px; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="auth-screen">
    <div class="card p-4 shadow-lg animate__animated animate__zoomIn" style="width: 350px;">
        <div class="text-center mb-4">
            <img src="Logo.png" class="app-logo mb-2" alt="Logo">
            <h5 class="fw-bold text-primary">Selamat Datang di GatiFin</h5>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Masuk</button>
        </form>
        <div class="text-center">
            <p class="mt-3 small">Belum punya akun? <a href="#" onclick="registerSimulated()">Daftar Disini</a></p>
        </div>
    </div>
</div>

<!-- MAIN APP CONTAINER -->
<div class="container-fluid" id="main-app" style="display: none;">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar py-4 position-fixed">
            <div class="text-center mb-4">
                <img src="Logo.png" class="app-logo mb-3">
                <img src="https://via.placeholder.com/80" id="sidebar-img-display" class="sidebar-profile rounded-circle mb-2">
                <div class="fw-bold text-white" id="sidebar-name-display">User</div>
            </div>
            <ul class="nav flex-column px-2">
                <li class="nav-item"><a class="nav-link active" onclick="showMenu('beranda', this)"><i class="bi bi-house-door me-2"></i> Beranda</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('tambah', this)"><i class="bi bi-plus-square me-2"></i> Tambah Data</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('riwayat', this)"><i class="bi bi-clock-history me-2"></i> Riwayat</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showMenu('profil', this)"><i class="bi bi-person me-2"></i> Profil</a></li>
                <li class="nav-item mt-4"><a class="nav-link text-danger" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i> Keluar</a></li>
            </ul>
        </nav>

        <!-- Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <!-- BERANDA -->
            <section id="beranda" class="menu-section active">
                <h2 class="fw-bold mb-4">Dashboard</h2>
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card bg-primary text-white p-4">
                            <small>Saldo</small>
                            <h2 id="disp-saldo">Rp 0</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-success text-white p-4">
                            <small>Masuk</small>
                            <h2 id="disp-masuk">Rp 0</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card bg-danger text-white p-4">
                            <small>Keluar</small>
                            <h2 id="disp-keluar">Rp 0</h2>
                        </div>
                    </div>
                </div>
            </section>

            <!-- TAMBAH DATA -->
            <section id="tambah" class="menu-section">
                <h2 class="fw-bold mb-4">Catat Transaksi</h2>
                <div class="card p-4 col-lg-6">
                    <form id="financeForm">
                        <div class="mb-3">
                            <label class="form-label">Tipe</label>
                            <select id="type" class="form-select" required>
                                <option value="masuk">Pemasukan</option>
                                <option value="keluar">Pengeluaran</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nominal</label>
                            <input type="number" id="amount" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Keterangan</label>
                            <input type="text" id="note" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tanggal</label>
                            <input type="date" id="date" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Simpan</button>
                    </form>
                </div>
            </section>

            <!-- RIWAYAT -->
            <section id="riwayat" class="menu-section">
                <h2 class="fw-bold mb-4">Riwayat</h2>
                <div class="card shadow-sm overflow-hidden">
                    <table class="table mb-0">
                        <thead class="table-light">
                            <tr><th>Tanggal</th><th>Ket</th><th>Nominal</th><th>Aksi</th></tr>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- PROFIL -->
            <section id="profil" class="menu-section">
                <h2 class="fw-bold mb-4">Profil</h2>
                <div class="card p-4">
                    <button class="btn btn-outline-dark mb-3" onclick="toggleTheme()">Ganti Tema (Dark/Light)</button>
                    <p>User: <span id="p-username-display"></span></p>
                </div>
            </section>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentUser = "";
    let transactions = [];

    // Simulasi Register (Karena GitHub tidak punya Database)
    function registerSimulated() {
        const u = prompt("Masukkan Username Baru:");
        const p = prompt("Masukkan Password Baru:");
        if(u && p) {
            let users = JSON.parse(localStorage.getItem('fintrack_users')) || {};
            users[u] = { password: p };
            localStorage.setItem('fintrack_users', JSON.stringify(users));
            alert("Pendaftaran Berhasil! Silakan Login.");
        }
    }

    // Login Logic
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const users = JSON.parse(localStorage.getItem('fintrack_users')) || {};

        if (users[u] && users[u].password === p) {
            sessionStorage.setItem('fintrack_logged_user', u);
            location.reload();
        } else {
            alert("Username atau Password Salah!");
        }
    });

    // Logout
    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // Menu Navigation
    function showMenu(menuId, el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => {
            s.style.display = 'none';
            s.classList.remove('active');
        });
        const target = document.getElementById(menuId);
        target.style.display = 'block';
        setTimeout(() => target.classList.add('active'), 50);
    }

    // Theme Toggle
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('fintrack_theme', isDark ? 'dark' : 'light');
    }

    // Finance Logic
    document.getElementById('financeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            id: Date.now(),
            type: document.getElementById('type').value,
            amount: parseInt(document.getElementById('amount').value),
            note: document.getElementById('note').value,
            date: document.getElementById('date').value
        };
        transactions.unshift(data);
        localStorage.setItem(`fintrack_db_${currentUser}`, JSON.stringify(transactions));
        this.reset();
        updateUI();
        alert("Data tersimpan!");
    });

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem(`fintrack_db_${currentUser}`, JSON.stringify(transactions));
        updateUI();
    }

    function updateUI() {
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = '';
        let inSum = 0, outSum = 0;

        transactions.forEach(t => {
            if(t.type === 'masuk') inSum += t.amount; else outSum += t.amount;
            tbody.innerHTML += `
                <tr>
                    <td>${t.date}</td>
                    <td>${t.note}</td>
                    <td class="${t.type === 'masuk' ? 'text-success' : 'text-danger'}">Rp ${t.amount.toLocaleString()}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteTransaction(${t.id})">Hapus</button></td>
                </tr>`;
        });

        document.getElementById('disp-masuk').innerText = `Rp ${inSum.toLocaleString()}`;
        document.getElementById('disp-keluar').innerText = `Rp ${outSum.toLocaleString()}`;
        document.getElementById('disp-saldo').innerText = `Rp ${(inSum - outSum).toLocaleString()}`;
    }

    // Initialization
    window.onload = () => {
        const loggedUser = sessionStorage.getItem('fintrack_logged_user');
        if (loggedUser) {
            currentUser = loggedUser;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('sidebar-name-display').innerText = currentUser;
            document.getElementById('p-username-display').innerText = currentUser;
            
            transactions = JSON.parse(localStorage.getItem(`fintrack_db_${currentUser}`)) || [];
            
            if(localStorage.getItem('fintrack_theme') === 'dark') {
                document.body.classList.add('dark-mode');
            }
            updateUI();
        }
    };
</script>
</body>
</html>
